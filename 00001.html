<style>/* HERO */
.order-hero{
  position:relative;min-height:55vh;
  display:flex;align-items:center;justify-content:center;
  text-align:center; overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background-image:url('images/image42.jpg');
  background-size:cover;background-position:center;
}
.hero-ov{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(5,4,7,0.65) 0%,rgba(5,4,7,0.97) 100%);
}
.hero-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(180,110,30,0.15) 0%,transparent 70%);
}
.hero-content{position:relative;z-index:2;padding:2rem;}
.order-eyebrow{font-family:var(--font-ui);font-weight:200;font-size:0.58rem;letter-spacing:0.55em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1.5rem;}
.order-number-display{font-family:var(--font-display);font-weight:300;font-size:clamp(4rem,12vw,9rem);color:var(--cream);letter-spacing:0.15em;opacity:0.2;line-height:1;display:block;}
.order-label{font-family:var(--font-ui);font-weight:100;font-size:0.55rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--dusk);margin-top:1rem;}
.gold-rule{width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:2rem auto;}

/* BODY */
.order-body{max-width:1000px;margin:0 auto;padding:6rem 2rem;}
.section-eyebrow{font-family:var(--font-ui);font-weight:200;font-size:0.55rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1.5rem;display:block;text-align:center;}

/* PROGRESS */
.progress-wrap{position:relative;margin:2rem 0 4rem;}
.progress-track{position:absolute;top:23px;left:24px;right:24px;height:1px;background:var(--whisper);}
.progress-fill{position:absolute;top:23px;left:24px;height:1px;background:linear-gradient(to right,var(--gold),var(--gold-dim));transition:width 1.5s var(--ease);}
.stages{display:flex;justify-content:space-between;}
.stage{display:flex;flex-direction:column;align-items:center;gap:0.6rem;flex:1;}
.stage-dot{
  width:48px;height:48px;border-radius:50%;
  border:1px solid var(--whisper);background:var(--void);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:0.85rem;color:var(--whisper);
  position:relative;z-index:1;transition:all 0.6s;
}
.stage.done .stage-dot{border-color:var(--gold-dim);color:var(--gold);}
.stage.now .stage-dot{border-color:var(--gold);color:var(--void);background:var(--gold);box-shadow:0 0 24px rgba(201,168,76,0.3);}
.stage-lbl{font-family:var(--font-ui);font-size:0.48rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--whisper);text-align:center;max-width:70px;}
.stage.done .stage-lbl,.stage.now .stage-lbl{color:var(--dusk);}

/* SPECS */
.specs-section{margin:5rem 0;}
.specs-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--whisper);border:1px solid var(--whisper);
  margin-top:1.5rem;
}
.spec-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:1rem 1.5rem;background:var(--deep);
  transition:background 0.25s;
}
.spec-row:hover{background:var(--surface);}
.spec-k{font-family:var(--font-ui);font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dusk);}
.spec-v{font-family:var(--font-body);font-size:0.95rem;color:var(--cream);text-align:right;}

/* UPDATES */
.updates-section{margin:5rem 0;}
.update{
  display:grid;grid-template-columns:160px 1fr;gap:3rem;
  padding:3rem 0;border-bottom:1px solid rgba(42,34,32,0.5);
}
.update:last-child{border-bottom:none;}
.u-date{font-family:var(--font-ui);font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-dim);padding-top:0.3rem;}
.u-text{font-size:1.1rem;color:var(--parchment);line-height:1.9;}
.u-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:1.25rem;}
.u-img{aspect-ratio:1;background:var(--surface);border:1px solid var(--whisper);overflow:hidden;}
.u-img img{width:100%;height:100%;object-fit:cover;filter:sepia(0.2) brightness(0.8);}

/* CONTACT */
.order-contact{
  text-align:center;padding:5rem 2rem;
  border-top:1px solid var(--whisper);
}
.contact-email{font-family:var(--font-display);font-weight:300;font-size:1.4rem;color:var(--gold-light);text-decoration:none;letter-spacing:0.05em;border-bottom:1px solid var(--gold-dim);padding-bottom:0.2rem;transition:color 0.25s,border-color 0.25s;}
.contact-email:hover{color:var(--cream);border-color:var(--gold);}

footer{border-top:1px solid var(--whisper);padding:3rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.footer-logo{height:28px;opacity:0.7;}
.footer-copy{font-family:var(--font-ui);font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--whisper);}

.reveal{opacity:0;transform:translateY(20px);transition:opacity 1s var(--ease),transform 1s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

@media(max-width:700px){
  .specs-grid{grid-template-columns:1fr;}
  .update{grid-template-columns:1fr;gap:1rem;}
  .stages{flex-wrap:wrap;gap:1rem;}
  .stage{flex:0 0 calc(25% - 1rem);}
}</style>
</head>

<script>// ═══════════════════════════════════════════════════════
// ORDER DATA — Replace this block for each new order page
// ═══════════════════════════════════════════════════════
const orderData = {
  orderNumber: "00001",
  currentStage: 3,
  specs: [
    { k:"Type",         v:"Classic" },
    { k:"Handle",       v:"Cocobolo (Exotic)" },
    { k:"Handle Length",v:'10\"' },
    { k:"Diameter",     v:'1\"' },
    { k:"Grip",         v:"Sinew — Matched to Falls" },
    { k:"Neck",         v:"Polished Brass — Engraved" },
    { k:"Fall Material",v:"Kangaroo Leather" },
    { k:"Fall Length",  v:'18\"' },
    { k:"Fall Width",   v:'½\"' },
    { k:"Fall Count",   v:"35" },
    { k:"Fall Ends",    v:'Dragon Split 1\"' },
    { k:"Butt",         v:"Capped + Hemp Wrist Tie" },
    { k:"Notes",        v:"Engraving confirmed by email" }
  ],
  updates: [
    { date:"2025-01-08", text:"Order received. Commission conversation complete. Design finalized. Cocobolo blank sourced from supplier. Kangaroo leather selected from stock — exceptional grain, tight and even.", images:[] },
    { date:"2025-01-15", text:"Cocobolo blank arrived. Beautiful piece — tight grain, deep red-orange with black streaks running lengthwise. Will make a remarkable handle. Leather inspected; cutting will begin once the handle form is established.", images:[] },
    { date:"2025-01-22", text:"Handle turning has begun. Rough profile established on the lathe. The Cocobolo is responding beautifully — the grain is revealing itself as we work down through layers. Diameter holding carefully to 1\" before wrapping.", images:[] }
  ]
};
// ═══════════════════════════════════════════════════════

const STAGES = ["Received","Design","Materials","Handle","Falls","Assembly","Finishing","Complete"];

// Render order number
document.getElementById('orderNum').textContent = orderData.orderNumber;
document.title = `Blackwall — Order ${orderData.orderNumber}`;

// Render stages
const stEl = document.getElementById('stagesEl');
STAGES.forEach((name,i) => {
  const done = i < orderData.currentStage;
  const now  = i === orderData.currentStage;
  const d = document.createElement('div');
  d.className = `stage ${done?'done':''} ${now?'now':''}`;
  d.innerHTML = `<div class="stage-dot">${done?'✓':i+1}</div><div class="stage-lbl">${name}</div>`;
  stEl.appendChild(d);
});
setTimeout(()=>{
  document.getElementById('pFill').style.width =
    (orderData.currentStage/(STAGES.length-1)*100)+'%';
},400);

// Render specs
const spEl = document.getElementById('specsEl');
orderData.specs.forEach(s => {
  const r = document.createElement('div');
  r.className='spec-row';
  r.innerHTML=`<span class="spec-k">${s.k}</span><span class="spec-v">${s.v}</span>`;
  spEl.appendChild(r);
});

// Render updates (newest first)
const upEl = document.getElementById('updatesEl');
[...orderData.updates].reverse().forEach(u => {
  const d = document.createElement('div');
  d.className='update';
  const imgs = u.images&&u.images.length
    ? `<div class="u-imgs">${u.images.map(s=>`<div class="u-img"><img src="${s}" alt=""></div>`).join('')}</div>`
    : '';
  d.innerHTML=`<div class="u-date">${u.date}</div><div class="u-text">${u.text}${imgs}</div>`;
  upEl.appendChild(d);
});

// Cursor

document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>ring.style.width=ring.style.height='60px');el.addEventListener('mouseleave',()=>ring.style.width=ring.style.height='40px');});

// Reveal</script>
<script src="shared.js"></script>
