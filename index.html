<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Blackwall — Coming Soon</title>
  <style>
    html, body { height: 100%; margin: 0; background: #070707; }
    .wrap { height: 100%; width: 100%; position: relative; overflow: hidden; }
    img.hero {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    /* Age gate overlay (discreet) */
    .gate {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
      padding: 24px;
    }
    .panel {
      max-width: 520px; width: 100%;
      background: rgba(10,10,10,0.86);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px 18px 16px;
      color: rgba(255,255,255,0.92);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
    }
    .panel h1 { margin: 0 0 8px; font-size: 18px; font-weight: 600; letter-spacing: 0.2px; }
    .panel p { margin: 0 0 12px; font-size: 14px; line-height: 1.35; color: rgba(255,255,255,0.8); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 10px 0 14px; }
    select, button {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }
    button {
      cursor: pointer;
      background: rgba(255,255,255,0.10);
    }
    button:hover { background: rgba(255,255,255,0.14); }
    .chk { display: flex; gap: 10px; align-items: flex-start; margin: 10px 0 14px; }
    .chk input { margin-top: 3px; }
    .fine { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 8px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <img class="hero" src="Blackwall-Coming-Soon-Page.png" alt="Blackwall — website coming soon" />

    <div id="gate" class="gate" role="dialog" aria-modal="true" aria-label="Age of majority access">
      <div class="panel">
        <h1>Age of Majority Access</h1>
        <p>This site is restricted to individuals who are the age of majority in their region.</p>

        <div class="row">
          <label for="region" style="font-size:14px;color:rgba(255,255,255,0.8);">Region</label>
          <select id="region" aria-label="Region">
            <option value="CA">Canada</option>
            <option value="US">United States</option>
            <option value="EU">European Union</option>
            <option value="UK">United Kingdom</option>
            <option value="AU">Australia</option>
            <option value="NZ">New Zealand</option>
            <option value="OTHER">Other</option>
          </select>
        </div>

        <div class="chk">
          <input id="confirm" type="checkbox" />
          <label for="confirm" style="font-size:14px;color:rgba(255,255,255,0.86);">
            I confirm I am the age of majority in my region.
          </label>
        </div>

        <div class="row">
          <button id="enter" type="button">Enter</button>
          <button id="exit" type="button">Exit</button>
        </div>

        <div class="fine">
          Your selection is stored locally to avoid showing this prompt repeatedly.
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const KEY = "bw_age_gate_v1";
      const gate = document.getElementById("gate");
      const region = document.getElementById("region");
      const confirm = document.getElementById("confirm");
      const enter = document.getElementById("enter");
      const exit = document.getElementById("exit");

      function hasValidAttestation() {
        try {
          const raw = localStorage.getItem(KEY);
          if (!raw) return false;
          const obj = JSON.parse(raw);
          return obj && obj.attested === true && typeof obj.ts === "string";
        } catch { return false; }
      }

      function hideGate() { gate.classList.add("hidden"); }

      if (hasValidAttestation()) hideGate();

      enter.addEventListener("click", function () {
        if (!confirm.checked) return;
        const payload = { attested: true, region: region.value, ts: new Date().toISOString() };
        localStorage.setItem(KEY, JSON.stringify(payload));
        hideGate();
      });

      exit.addEventListener("click", function () {
        window.location.href = "https://www.google.com/";
      });
    })();
  </script>
</body>
</html>
