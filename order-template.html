<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackwall — Order XXXXX</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@100;200;300&display=swap" rel="stylesheet">
<style>
/* == SHARED CSS == */
/* ═══════════════════════════════════════════
   BLACKWALL — Shared Styles
   Loaded by every page. Page-specific CSS
   stays in each file's own <style> block.
═══════════════════════════════════════════ */
:root{--void:#050407;--abyss:#080610;--deep:#0e0b14;--surface:#141118;--ember:#c9762a;--ember-dark:#5c3510;--ember-glow:#d4944e;--gold:#c9a84c;--gold-light:#e2c97e;--gold-dim:#7a5f2a;--cream:#e8dcc8;--parchment:#c4b49a;--dusk:#6a5e4e;--whisper:#2a2220;--font-display:'Cinzel','Palatino Linotype',serif;--font-body:'Cormorant Garamond','Georgia',serif;--font-ui:'Raleway','Futura',sans-serif;--ease:cubic-bezier(0.16,1,0.3,1);--t-slow:0.9s;--t-mid:0.5s;--t-fast:0.25s;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--cream);font-family:var(--font-body);font-weight:300;line-height:1.8;overflow-x:hidden;cursor:none;}
.cur-dot{position:fixed;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
.cur-ring{position:fixed;width:40px;height:40px;border:1px solid rgba(201,168,76,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .4s var(--ease),height .4s var(--ease),border-color .3s;}
.cur-dot.active{width:12px;height:12px;}
.cur-ring.active{width:64px;height:64px;border-color:rgba(201,168,76,0.7);}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:center;gap:5rem;padding:1.5rem 4rem;background:linear-gradient(to bottom,rgba(5,4,7,0.92) 0%,rgba(5,4,7,0.6) 60%,transparent 100%);}
.nav-links{display:flex;gap:4rem;list-style:none;align-items:center;}
.nav-links a{font-family:var(--font-ui);font-weight:200;font-size:0.62rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--dusk);text-decoration:none;transition:color var(--t-fast);display:inline-block;text-align:center;line-height:1.7;}
.nav-links a:hover{color:var(--gold-light);}
.nav-logo{height:114px;opacity:0.9;transition:opacity var(--t-fast);}
.nav-logo:hover{opacity:1;}
.section{position:relative;padding:10rem 4rem;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
.section-bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.section-overlay{position:absolute;inset:0;background:rgba(5,4,7,0.84);}
.section-inner{position:relative;z-index:2;max-width:1100px;display:flex;flex-direction:column;align-items:center;gap:2rem;width:100%;}
.eyebrow{font-family:var(--font-ui);font-weight:200;font-size:0.58rem;letter-spacing:0.55em;text-transform:uppercase;color:var(--gold-dim);}
.section-title{font-family:var(--font-display);font-weight:300;font-size:clamp(2rem,5vw,3.8rem);letter-spacing:0.06em;color:var(--cream);line-height:1.25;}
.section-title em{font-style:italic;color:var(--ember-glow);}
.section-body{font-size:1.2rem;color:var(--cream);line-height:2;max-width:700px;}
.gold-rule{width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);}
.btn{font-family:var(--font-ui);font-weight:200;font-size:0.6rem;letter-spacing:0.35em;text-transform:uppercase;text-decoration:none;padding:1rem 2.8rem;display:inline-block;transition:all var(--t-mid) var(--ease);position:relative;overflow:hidden;border:1px solid var(--gold-dim);color:var(--gold-light);}
.btn::before{content:'';position:absolute;inset:0;transform:scaleX(0);transform-origin:left;transition:transform var(--t-mid) var(--ease);z-index:-1;background:var(--gold);}
.btn:hover::before{transform:scaleX(1);}
.btn:hover{color:var(--void);border-color:var(--gold);}
.page-hero{position:relative;min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;animation:hZ 18s ease-in-out infinite alternate;}
@keyframes hZ{from{transform:scale(1.04);}to{transform:scale(1.08);}}
.hero-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(5,4,7,0.2) 0%,rgba(5,4,7,0.7) 55%,rgba(5,4,7,0.97) 100%);}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 700px 400px at 50% 45%,rgba(180,110,30,0.15) 0%,transparent 70%);animation:gB 6s ease-in-out infinite;}
@keyframes gB{0%,100%{opacity:.7;}50%{opacity:1;}}
.hero-content{position:relative;z-index:2;padding:2rem;animation:hF 2s var(--ease) both;}
@keyframes hF{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.hero-title{font-family:var(--font-display);font-weight:300;font-size:clamp(2.5rem,7vw,5.5rem);color:var(--cream);letter-spacing:0.08em;line-height:1.2;margin-bottom:1.5rem;}
.hero-title em{font-style:italic;color:var(--ember-glow);}
.gold-rule-c{width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:2rem auto;}
footer{background:var(--void);border-top:1px solid var(--whisper);padding:4rem;display:flex;flex-direction:column;align-items:center;gap:2rem;text-align:center;}
.footer-logo{height:28px;opacity:0.65;}
.footer-rule{width:200px;height:1px;background:linear-gradient(to right,transparent,var(--whisper),transparent);}
.footer-artisan{font-family:var(--font-body);font-style:italic;font-size:1rem;color:var(--parchment);}
.footer-copy{font-family:var(--font-ui);font-size:0.52rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--dusk);}
.reveal{opacity:0;transform:translateY(24px);transition:opacity 1.1s var(--ease),transform 1.1s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}
.rd1{transition-delay:.15s;}.rd2{transition-delay:.3s;}.rd3{transition-delay:.45s;}.rd4{transition-delay:.6s;}
@media(max-width:900px){nav{gap:2rem;padding:1rem 2rem;}.nav-links{gap:2rem;}.section{padding:7rem 2rem;}}
@media(max-width:600px){.nav-links{display:none;}}

/* == END SHARED == */
/* HERO */
.order-hero{
  position:relative;min-height:55vh;
  display:flex;align-items:center;justify-content:center;
  text-align:center; overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background-image:url('images/image43.jpg');
  background-size:cover;background-position:center;
}
.hero-ov{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(5,4,7,0.65) 0%,rgba(5,4,7,0.97) 100%);
}
.hero-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 600px 400px at 50% 50%,rgba(180,110,30,0.15) 0%,transparent 70%);
}
.hero-content{position:relative;z-index:2;padding:2rem;}
.order-eyebrow{font-family:var(--font-ui);font-weight:200;font-size:0.58rem;letter-spacing:0.55em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1.5rem;}
.order-number-display{font-family:var(--font-display);font-weight:300;font-size:clamp(4rem,12vw,9rem);color:var(--cream);letter-spacing:0.15em;opacity:0.2;line-height:1;display:block;}
.order-label{font-family:var(--font-ui);font-weight:100;font-size:0.55rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--dusk);margin-top:1rem;}
.gold-rule{width:120px;height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:2rem auto;}

/* BODY */
.order-body{max-width:1000px;margin:0 auto;padding:6rem 2rem;}
.section-eyebrow{font-family:var(--font-ui);font-weight:200;font-size:0.55rem;letter-spacing:0.5em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:1.5rem;display:block;text-align:center;}

/* PROGRESS */
.progress-wrap{position:relative;margin:2rem 0 4rem;}
.progress-track{position:absolute;top:23px;left:24px;right:24px;height:1px;background:var(--whisper);}
.progress-fill{position:absolute;top:23px;left:24px;height:1px;background:linear-gradient(to right,var(--gold),var(--gold-dim));transition:width 1.5s var(--ease);}
.stages{display:flex;justify-content:space-between;}
.stage{display:flex;flex-direction:column;align-items:center;gap:0.6rem;flex:1;}
.stage-dot{
  width:48px;height:48px;border-radius:50%;
  border:1px solid var(--whisper);background:var(--void);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:0.85rem;color:var(--whisper);
  position:relative;z-index:1;transition:all 0.6s;
}
.stage.done .stage-dot{border-color:var(--gold-dim);color:var(--gold);}
.stage.now .stage-dot{border-color:var(--gold);color:var(--void);background:var(--gold);box-shadow:0 0 24px rgba(201,168,76,0.3);}
.stage-lbl{font-family:var(--font-ui);font-size:0.48rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--whisper);text-align:center;max-width:70px;}
.stage.done .stage-lbl,.stage.now .stage-lbl{color:var(--dusk);}

/* SPECS */
.specs-section{margin:5rem 0;}
.specs-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--whisper);border:1px solid var(--whisper);
  margin-top:1.5rem;
}
.spec-row{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:1rem 1.5rem;background:var(--deep);
  transition:background 0.25s;
}
.spec-row:hover{background:var(--surface);}
.spec-k{font-family:var(--font-ui);font-size:0.52rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--dusk);}
.spec-v{font-family:var(--font-body);font-size:0.95rem;color:var(--cream);text-align:right;}

/* UPDATES */
.updates-section{margin:5rem 0;}
.update{
  display:grid;grid-template-columns:160px 1fr;gap:3rem;
  padding:3rem 0;border-bottom:1px solid rgba(42,34,32,0.5);
}
.update:last-child{border-bottom:none;}
.u-date{font-family:var(--font-ui);font-size:0.55rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold-dim);padding-top:0.3rem;}
.u-text{font-size:1.1rem;color:var(--parchment);line-height:1.9;}
.u-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-top:1.25rem;}
.u-img{aspect-ratio:1;background:var(--surface);border:1px solid var(--whisper);overflow:hidden;}
.u-img img{width:100%;height:100%;object-fit:cover;filter:sepia(0.2) brightness(0.8);}

/* CONTACT */
.order-contact{
  text-align:center;padding:5rem 2rem;
  border-top:1px solid var(--whisper);
}
.contact-email{font-family:var(--font-display);font-weight:300;font-size:1.4rem;color:var(--gold-light);text-decoration:none;letter-spacing:0.05em;border-bottom:1px solid var(--gold-dim);padding-bottom:0.2rem;transition:color 0.25s,border-color 0.25s;}
.contact-email:hover{color:var(--cream);border-color:var(--gold);}

footer{border-top:1px solid var(--whisper);padding:3rem;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.5rem;}
.footer-logo{height:28px;opacity:0.7;}
.footer-copy{font-family:var(--font-ui);font-size:0.5rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--whisper);}

.reveal{opacity:0;transform:translateY(20px);transition:opacity 1s var(--ease),transform 1s var(--ease);}
.reveal.visible{opacity:1;transform:translateY(0);}

@media(max-width:700px){
  .specs-grid{grid-template-columns:1fr;}
  .update{grid-template-columns:1fr;gap:1rem;}
  .stages{flex-wrap:wrap;gap:1rem;}
  .stage{flex:0 0 calc(25% - 1rem);}
}
/* ── MOBILE NAV ── */
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 0.5rem;
  position: fixed;
  top: 1.2rem;
  right: 1.5rem;
  z-index: 300;
}
.nav-hamburger span {
  display: block;
  width: 24px;
  height: 1px;
  background: var(--gold-dim);
  transition: all 0.3s var(--ease);
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
.nav-mobile-menu {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 250;
  background: rgba(5,4,7,0.97);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
}
.nav-mobile-menu.open { display: flex; }
.nav-mobile-menu a {
  font-family: var(--font-display);
  font-weight: 300;
  font-size: 1.6rem;
  letter-spacing: 0.12em;
  color: var(--cream);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.25s;
}
.nav-mobile-menu a:hover { color: var(--gold-light); }
.nav-mobile-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  font-family: var(--font-ui);
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--dusk);
  cursor: pointer;
  transition: color 0.25s;
}
.nav-mobile-close:hover { color: var(--gold); }
@media(max-width:600px) {
  .nav-hamburger { display: flex; }
  nav { justify-content: center; padding: 1rem 2rem; }
  .nav-logo { height: 70px; }
}

</style>
</head>
<body>
<div class="cur-dot" id="curDot"></div>
<div class="cur-ring" id="curRing"></div>

<nav>
  <ul class="nav-links">
    <li><a href="artisan.html">The Artisan</a></li>
    <li><a href="materials.html">Materials</a></li>
  </ul>
  <a href="home.html"><img class="nav-logo" src="Transparent logo white font.png" alt="Blackwall"></a>
  <ul class="nav-links">
    <li><a href="commission.html">Commission</a></li>
    <li><a href="pricing.html">Pricing</a></li>
  </ul>
</nav>

<div class="order-hero">
  <div class="hero-bg"></div>
  <div class="hero-ov"></div>
  <div class="hero-glow"></div>
  <div class="hero-content">
    <p class="order-eyebrow">Commission in Progress</p>
    <span class="order-number-display" id="orderNum">XXXXX</span>
    <div class="gold-rule"></div>
    <p class="order-label">Order Number</p>
  </div>
</div>

<div class="order-body">
  <!-- PROGRESS -->
  <span class="section-eyebrow reveal">Production Status</span>
  <div class="progress-wrap reveal">
    <div class="progress-track"></div>
    <div class="progress-fill" id="pFill" style="width:0%"></div>
    <div class="stages" id="stagesEl"></div>
  </div>

  <!-- SPECS -->
  <div class="specs-section reveal">
    <span class="section-eyebrow">Your Commission</span>
    <div class="specs-grid" id="specsEl"></div>
  </div>

  <!-- UPDATES -->
  <div class="updates-section reveal">
    <span class="section-eyebrow">Progress Updates</span>
    <div id="updatesEl"></div>
  </div>

  <!-- CONTACT -->
  <div class="order-contact reveal">
    <p style="font-family:var(--font-body);font-size:1.1rem;color:var(--parchment);margin-bottom:2rem;">Questions about your order?</p>
    <a href="mailto:info@blackwallbdsm.com" class="contact-email">info@blackwallbdsm.com</a>
  </div>
</div>

<footer>
  <img class="footer-logo" src="Transparent logo white font.png" alt="Blackwall">
  <p class="footer-copy">&copy; 2025 Blackwall &nbsp;·&nbsp; J. Christophe Aishe, Artisan</p>
</footer>

<script>// ═══════════════════════════════════════════════════════
// ORDER DATA — Replace this block for each new order page
// ═══════════════════════════════════════════════════════
const orderData = {
  orderNumber: "XXXXX",
  currentStage: 0,
  // Stages 0-7: Received | Design | Materials | Handle | Falls | Assembly | Finishing | Complete
  specs: [
    { k:"Type",         v:"Classic" },
    { k:"Handle",       v:"—" },
    { k:"Handle Length",v:"—" },
    { k:"Diameter",     v:"—" },
    { k:"Grip",         v:"—" },
    { k:"Neck",         v:"—" },
    { k:"Fall Material",v:"—" },
    { k:"Fall Length",  v:"—" },
    { k:"Fall Width",   v:"—" },
    { k:"Fall Count",   v:"—" },
    { k:"Fall Ends",    v:"—" },
    { k:"Butt",         v:"—" },
    { k:"Notes",        v:"—" }
  ],
  updates: [
    { date:"—", text:"Order received. Production scheduled.", images:[] }
  ]
};
// ═══════════════════════════════════════════════════════

const STAGES = ["Received","Design","Materials","Handle","Falls","Assembly","Finishing","Complete"];

// Render order number
document.getElementById('orderNum').textContent = orderData.orderNumber;
document.title = `Blackwall — Order ${orderData.orderNumber}`;

// Render stages
const stEl = document.getElementById('stagesEl');
STAGES.forEach((name,i) => {
  const done = i < orderData.currentStage;
  const now  = i === orderData.currentStage;
  const d = document.createElement('div');
  d.className = `stage ${done?'done':''} ${now?'now':''}`;
  d.innerHTML = `<div class="stage-dot">${done?'✓':i+1}</div><div class="stage-lbl">${name}</div>`;
  stEl.appendChild(d);
});
setTimeout(()=>{
  document.getElementById('pFill').style.width =
    (orderData.currentStage/(STAGES.length-1)*100)+'%';
},400);

// Render specs
const spEl = document.getElementById('specsEl');
orderData.specs.forEach(s => {
  const r = document.createElement('div');
  r.className='spec-row';
  r.innerHTML=`<span class="spec-k">${s.k}</span><span class="spec-v">${s.v}</span>`;
  spEl.appendChild(r);
});

// Render updates (newest first)
const upEl = document.getElementById('updatesEl');
[...orderData.updates].reverse().forEach(u => {
  const d = document.createElement('div');
  d.className='update';
  const imgs = u.images&&u.images.length
    ? `<div class="u-imgs">${u.images.map(s=>`<div class="u-img"><img src="${s}" alt=""></div>`).join('')}</div>`
    : '';
  d.innerHTML=`<div class="u-date">${u.date}</div><div class="u-text">${u.text}${imgs}</div>`;
  upEl.appendChild(d);
});

// Cursor

document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>ring.style.width=ring.style.height='60px');el.addEventListener('mouseleave',()=>ring.style.width=ring.style.height='40px');});

// Reveal</script>
<script>
/* Blackwall — shared.js
   Custom cursor + scroll-reveal used on every page.
   Page-specific hover targets can be passed via window.BW_HOVER
   e.g. window.BW_HOVER = 'a,button,.enh-card,.faq-item';
*/
(function(){
  var dot=document.getElementById('curDot'),ring=document.getElementById('curRing');
  if(!dot||!ring)return;
  var cx=0,cy=0,rx=0,ry=0;
  document.addEventListener('mousemove',function(e){cx=e.clientX;cy=e.clientY;dot.style.left=cx+'px';dot.style.top=cy+'px';});
  (function a(){rx+=(cx-rx)*0.1;ry+=(cy-ry)*0.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
  var sel=window.BW_HOVER||'a,button';
  document.querySelectorAll(sel).forEach(function(el){
    el.addEventListener('mouseenter',function(){dot.classList.add('active');ring.classList.add('active');});
    el.addEventListener('mouseleave',function(){dot.classList.remove('active');ring.classList.remove('active');});
  });
  var obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('visible');obs.unobserve(x.target);}});},{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(function(el){obs.observe(el);});
})();

</script>
